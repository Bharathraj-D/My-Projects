
<!DOCTYPE html>

<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login Page</title>
	<link rel="stylesheet" href="login.css">
</head>
<body>
	<script src="login.js" defer></script>
	<div class="container">
      <div class="header">
            <img src="Images/image.png" class="bank-logo">
            <p class="bank-title">TRUST ONLY BANK</p>
      </div>
	  </div>
     <div class="login-box">
     	<h1 class="heading">LOGIN</h1>
     	<p class="select-login">Login as: </p>
     	<input type="radio" name="loginAs" id="admin">Admin
     	<input type="radio" name="loginAs" id="user"  checked>User
     	<div class="details-box">
     	<p class="give-details" id="Enter">Enter your Account no:</p>
     	<input type="text" placeholder="Account No" class="inputs-details" id="accountNo">
     	<p class="give-details">Enter the password</p>
     	<input type="password" placeholder="Password" class="inputs-details" id="password">
        </div>
     	<button class="login-button" id="login">Login</button>
     </div>
	 

</body>
</html>
